<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTM Dice Roller - V5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <div id="rouseCheckWidget" class="rouse-widget">
        <h3>Teste de Fome</h3>
        <div id="rouseDiceSlot" class="dice-slot" style="margin: 10px auto;">
            <img id="rouseDiceImg" src="images_vampire/normal_fail.png" alt="Dado">
        </div>
        <div id="rouseResultText" class="rouse-text">-</div>
        <button id="manualRouseBtn" style="width: 100%; margin: 10px 0 0 0; font-size: 12px; padding: 5px;">Rolar Manual</button>
    </div>
        <h1>Vampiro: A Máscara - Rolagem de Dados V5</h1>
        
        <div style="position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000;">
            <button id="themeToggleBtn" class="toggle-button" style="background-color: #222; color: #888; padding: 8px 12px; font-size: 12px; border: 1px solid #444; border-radius: 5px; transition: 0.3s; cursor: pointer;">⚙️ Tema: Steampunk</button>
            
            <a href="win_chance.html" class="toggle-button" style="text-decoration: none; background-color: #222; color: #888; padding: 8px 12px; font-size: 12px; border: 1px solid #444; border-radius: 5px; transition: 0.3s;">📊 Chance de Vitória</a>
        </div>

        <div class="row macro-selection">
            <select id="macroSelect">
                <option value="">Carregar macro salva...</option>
            </select>
            <button id="deleteMacroBtn" style="background-color: #8b0000;">Deletar</button>
            <button id="saveMacroBtn" style="background-color: #444;">Salvar Macro</button>
        </div>
        
        <div class="row">
            <label>Hunger: <input type="number" id="hunger" min="0" max="5" value="0"></label>
            <label>Blood Potency: <input type="number" id="bp" min="0" max="10" value="0"></label>
            <input type="text" id="disciplineBuff" readonly value="Buff de Disciplina: +0">
            <input type="text" id="bloodSurgeBuff" readonly value="Blood Surge: +1">
        </div>
        
        <div class="row">
            <label>Atributo: <input type="number" id="attribute" min="0" value="0"></label>
            <label>Skill: <input type="number" id="skill" min="0" value="0"></label>
            <label>Vantagem: <input type="number" id="advantage" min="0" value="0"></label>

            <input type="checkbox" id="disciplineCheck" class="hidden-checkbox">
            <label for="disciplineCheck" id="disciplineLabel" class="toggle-button">Discipline</label>

            <input type="checkbox" id="bloodSurgeCheck" class="hidden-checkbox">
            <label for="bloodSurgeCheck" id="bloodSurgeLabel" class="toggle-button">Blood Surge</label>

            <div class="spacer"></div>
            <label>Bônus da Arma: <input type="number" id="weaponBonus" min="0" value="0"></label>
            <div style="display: flex; flex-direction: column; align-items: flex-start; gap: 8px; margin-left: 10px;">
                <label>Dificuldade:</label>
                <input type="hidden" id="difficulty" value="0">
                <div id="diffButtonGroup" style="display: flex; flex-wrap: wrap; max-width: 220px; gap: 5px;">
                    <button type="button" class="diff-btn active" data-val="0">0</button>
                    <button type="button" class="diff-btn" data-val="1">1</button>
                    <button type="button" class="diff-btn" data-val="2">2</button>
                    <button type="button" class="diff-btn" data-val="3">3</button>
                    <button type="button" class="diff-btn" data-val="4">4</button>
                    <button type="button" class="diff-btn" data-val="5">5</button>
                    <button type="button" class="diff-btn" data-val="6">6</button>
                    <button type="button" class="diff-btn" data-val="7">7</button>
                    <button type="button" class="diff-btn" data-val="8">8</button>
                    <button type="button" class="diff-btn" data-val="9">9</button>
                    <button type="button" class="diff-btn" data-val="10">10</button>
                    <button type="button" class="diff-btn" data-val="11">11</button>
                </div>
            </div>
        </div>
        
        <div class="row">
            <input type="text" id="dicePool" readonly value="Dice Pool Final: 0">
            <button id="rollButton">ROLAR</button>
            <button id="willpowerButton" disabled>Força de Vontade</button>
        </div>
        
        <div id="diceSlots"></div>
        
        <div id="probabilityDisplay" class="probability-container" style="display: none;">
            <div class="prob-stat">Sucesso: <span id="probSuccess">0%</span></div>
            <div class="prob-stat messy">Messy Critical: <span id="probMessy">0%</span></div>
            <div class="prob-stat bestial">Falha Bestial: <span id="probBestial">0%</span></div>
        </div>
        
        <div id="resultsLog"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
